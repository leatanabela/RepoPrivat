<!DOCTYPE html>

<html lang="ro"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1c385f",
                        "background-light": "#f6f7f8",
                        "background-dark": "#13181f",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
            font-size: 18px;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            border-color: #1c385f;
            ring-color: #1c385f;
            outline: none;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="flex-grow flex flex-col items-center">
<div class="w-full max-w-[800px] flex flex-col h-full">
<header class="flex items-center justify-between px-6 py-8 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50">
<div class="flex items-center gap-3">
<div class="bg-primary text-white p-2 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined">support_agent</span>
</div>
<h1 class="text-2xl font-black tracking-tight text-primary dark:text-slate-100">Portal Suport</h1>
</div>
<button class="p-3 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined">notifications</span>
</button>
</header>
<main class="flex-grow px-6 py-10">
<div class="mb-10">
<h2 class="text-4xl font-black text-slate-900 dark:text-white mb-2 leading-tight">Sesizare Nouă</h2>
<p class="text-xl text-slate-500 dark:text-slate-400">Te rugăm să completezi formularul de mai jos pentru asistență tehnică.</p>
</div>
<form class="space-y-8">
<div class="space-y-3">
<label class="text-xl font-bold text-slate-800 dark:text-slate-200 block" for="subject">Subiect</label>
<input class="w-full h-16 px-6 text-xl rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all placeholder:text-slate-400" id="subject" name="subject" placeholder="Ex: Eroare conectare imprimantă" type="text"/>
</div>
<div class="space-y-3">
<label class="text-xl font-bold text-slate-800 dark:text-slate-200 block" for="category">Categorie</label>
<div class="relative">
<select class="w-full h-16 px-6 pr-12 text-xl rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 appearance-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all" id="category" name="category">
<option disabled="" selected="" value="">Alegeți o categorie...</option>
<option value="it">Suport IT / Hardware</option>
<option value="software">Aplicații / Software</option>
<option value="retea">Internet / Rețea</option>
<option value="altele">Alte solicitări</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">expand_more</span>
</div>
</div>
<div class="space-y-3">
<p class="text-xl font-bold text-slate-800 dark:text-slate-200 block">Urgență</p>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<label class="relative flex items-center cursor-pointer group">
<input class="peer sr-only" name="urgency" type="radio" value="low"/>
<div class="w-full py-5 px-6 text-center rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 peer-checked:border-green-600 peer-checked:bg-green-50 dark:peer-checked:bg-green-900/20 peer-checked:text-green-700 dark:peer-checked:text-green-400 transition-all hover:bg-slate-50 dark:hover:bg-slate-800/50">
<span class="text-lg font-bold">Mică</span>
</div>
</label>
<label class="relative flex items-center cursor-pointer group">
<input checked="" class="peer sr-only" name="urgency" type="radio" value="medium"/>
<div class="w-full py-5 px-6 text-center rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 peer-checked:border-orange-500 peer-checked:bg-orange-50 dark:peer-checked:bg-orange-900/20 peer-checked:text-orange-700 dark:peer-checked:text-orange-400 transition-all hover:bg-slate-50 dark:hover:bg-slate-800/50">
<span class="text-lg font-bold">Medie</span>
</div>
</label>
<label class="relative flex items-center cursor-pointer group">
<input class="peer sr-only" name="urgency" type="radio" value="high"/>
<div class="w-full py-5 px-6 text-center rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 peer-checked:border-red-600 peer-checked:bg-red-50 dark:peer-checked:bg-red-900/20 peer-checked:text-red-700 dark:peer-checked:text-red-400 transition-all hover:bg-slate-50 dark:hover:bg-slate-800/50">
<span class="text-lg font-bold">Mare</span>
</div>
</label>
</div>
</div>
<div class="space-y-3">
<label class="text-xl font-bold text-slate-800 dark:text-slate-200 block" for="description">Descriere</label>
<textarea class="w-full p-6 text-xl rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all placeholder:text-slate-400 resize-none" id="description" name="description" placeholder="Descrieți problema cât mai detaliat..." rows="5"></textarea>
</div>
<div class="flex flex-col sm:flex-row gap-4 pt-6 pb-20">
<button class="flex-1 h-16 bg-primary hover:bg-primary/90 text-white rounded-xl text-xl font-bold transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined">send</span>
                            Trimite Tichet
                        </button>
<button class="sm:w-1/3 h-16 bg-slate-200 hover:bg-slate-300 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 rounded-xl text-xl font-bold transition-all flex items-center justify-center gap-2" type="button">
                            Anulează
                        </button>
</div>
</form>
</main>
</div>
</div>
</body></html>
